server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA: fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        access_log off;
    }
}
